<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Cottage - สั่งอาหาร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="topbar">
        <div class="table-box" id="tableNo">โต๊ะ -</div>
        <div class="logo">
            <h1>De Cottage</h1>
        </div>

        <div class="right-icons">
            <button id="loginBtn" class="login-btn-top" 
                    data-bs-toggle="modal" 
                    data-bs-target="#loginModal"
                    onclick="sessionStorage.setItem('redirectURL', window.location.href)">
                เข้าสู่ระบบ
            </button>

            <div id="userProfile" class="user-profile" style="display: none;">
                <span id="userNameDisplay" class="user-name"></span>
                <div id="userIconContainer" onclick="toggleUserMenu()" style="cursor: pointer;">
                    <div class="user-icon">👤</div>
                </div>
                <div id="userMenu" class="user-menu shadow">
                    <button style="color: #000; font-weight: 500;" onclick="openEditProfile()">แก้ไขรูปโปรไฟล์</button>
                    <hr style="margin: 4px 0; opacity: 0.1;">
                    <button onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>

            <button class="icon-btn" onclick="callStaff()">🔔</button>
            <button type="button" class="icon-btn" onclick="openBillPopup()" title="ดูรายการที่สั่ง">📄</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 ค้นหาเมนู..." onkeyup="searchMenu()">
    </div>

    <div class="categories">
        <div class="cat active" onclick="filterCat(event,'all')">ทั้งหมด</div>
        <div class="cat" onclick="filterCat(event,'padsen')">ผัดเส้น</div>
        <div class="cat" onclick="filterCat(event,'fried')">ทอด</div>
        <div class="cat" onclick="filterCat(event,'yam')">ยำ</div>
        <div class="cat" onclick="filterCat(event,'pad')">ผัด</div>
        <div class="cat" onclick="filterCat(event,'kao')">อาหารจานเดียว</div>
    </div>

    <div id="menuContainer" class="menu"></div>

    <div id="callPopup" class="popup">
        <div class="popup-content popup-call">
            <h3>เรียกพนักงาน</h3>
            <p>ต้องการเรียกพนักงานใช่หรือไม่?</p>
            <div class="popup-actions">
                <button class="btn btn-primary" onclick="confirmCall()">เรียก</button>
                <button class="btn btn-ghost" onclick="closeCall()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="tarotBox" onclick="openTarot()">
        <span class="closeTarot" onclick="event.stopPropagation(); closeTarot()">✕</span>🔮
    </div>

    <div id="tarotPopup" class="popup">
        <div class="popup-content popup-tarot">
            <p id="menuResult" class="tarot-result"></p>
            <button class="btn btn-primary" onclick="closePopup()">ปิด</button>
        </div>
    </div>

    <button id="orderBtn" onclick="openOrderPopup()">
        <span class="order-btn-icon">🛒</span>
        <span class="order-btn-text">สั่งอาหาร</span>
        <span class="order-btn-badge" id="orderBadge" style="display:none">0</span>
    </button>

    <div id="orderPopup" class="popup popup-order-wrap" style="display:none;">
        <div class="popup-content popup-order">
            <div class="popup-order-header">
                <h3>ตะกร้าสินค้า</h3>
                <button type="button" class="popup-close" onclick="closeOrderPopup()">✕</button>
            </div>
            <div class="popup-order-body">
                <ul id="orderList" class="order-list"></ul>
            </div>
            <div class="popup-order-footer">
                <div class="order-total-row">รวม: <strong id="orderTotal">0 ฿</strong></div>
                <button class="btn btn-primary w-100" onclick="confirmOrder()" style="background-color: #e85d04;">ยืนยันสั่ง</button>
            </div>
        </div>
    </div>

    <div id="billPopup" class="popup popup-order-wrap" style="display:none;">
        <div class="popup-content popup-order">
            <div class="popup-order-header">
                <h3>📄 รายการที่สั่ง</h3>
                <button type="button" class="popup-close" onclick="closeBillPopup()">✕</button>
            </div>
            <div class="popup-order-body">
                <div id="billContent"></div>
            </div>
            <button class="btn btn-primary m-3" onclick="closeBillPopup()" style="background-color: #e85d04;">ปิด</button>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div id="loginBox" class="p-4">
                    <div class="text-center mb-4"><h3 class="fw-bold" style="color: #e85d04;">Login</h3></div>
                    <div id="loginError" class="alert alert-danger d-none"></div>
                    <form id="loginForm">
                        <div class="mb-3"><input id="loginUser" class="form-control" placeholder="ชื่อผู้ใช้งาน" required></div>
                        <div class="mb-3"><input id="loginPass" type="password" class="form-control" placeholder="รหัสผ่าน" required></div>
                        <button type="submit" class="btn w-100 py-2 fw-bold" style="background-color: #e85d04; color: white;">เข้าสู่ระบบ</button>
                    </form>
                    <div class="text-center mt-4"><a href="#" id="toRegister" style="color: #e85d04; text-decoration: none;">สมัครสมาชิก</a></div>
                </div>
                <div id="registerBox" class="p-4 d-none">
                    <div class="text-center mb-4"><h3 class="fw-bold" style="color: #e85d04;">Register</h3></div>
                    <div id="registerError" class="alert alert-danger d-none"></div>
                    <form id="registerForm">
                        <div class="mb-3"><input id="regUser" class="form-control" placeholder="ชื่อผู้ใช้งาน" required></div>
                        <div class="mb-3"><input id="regPass" type="password" class="form-control" placeholder="รหัสผ่าน" required></div>
                        <div class="mb-3"><input id="regPassConfirm" type="password" class="form-control" placeholder="ยืนยันรหัสผ่าน" required></div>
                        <button type="submit" class="btn w-100 py-2 fw-bold" style="background-color: #e85d04; color: white;">สมัครสมาชิก</button>
                    </form>
                    <div class="text-center mt-4"><a href="#" id="toLogin" style="color: #e85d04; text-decoration: none;">กลับไปหน้าล็อคอิน</a></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="p-3 d-flex justify-content-end">
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" style="background-color: #eee; border-radius: 50%; padding: 10px; font-size: 12px;"></button>
                </div>
                <div class="modal-body text-center px-4 pb-4">
                    <h3 class="fw-bold mb-4" style="color: #e85d04;">แก้ไขรูปโปรไฟล์</h3>
                    <form id="editProfileForm">
                        <div class="position-relative d-inline-block mb-4">
                            <div style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #e85d04; padding: 3px; background: #fff;">
                                <img id="avatarPreview" src="" class="rounded-circle shadow-sm" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <label for="editProfileImg" class="position-absolute shadow-sm" style="bottom: 5px; right: 5px; background: #e85d04; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff;">
                                <span style="color: white; font-size: 16px;">📷</span>
                                <input type="file" id="editProfileImg" class="d-none" accept="image/*" onchange="previewImage(event)">
                            </label>
                        </div>
                        <input type="hidden" id="editUser">
                        <div class="text-start mb-4">
                            <label class="text-muted small ms-2">ชื่อผู้ใช้งาน</label>
                            <div class="input-group shadow-sm" style="border-radius: 12px; overflow: hidden; border: 1px solid #eee;">
                                <span class="input-group-text bg-white border-0">🔒</span>
                                <input id="displayUsername" class="form-control border-0 bg-white py-2" readonly>
                            </div>
                        </div>
                        <button type="submit" class="btn w-100 py-2 fw-bold" style="background: #e85d04; color: white; border-radius: 12px;">บันทึกการเปลี่ยนแปลง</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script type="module" src="auth.js"></script>

    <script>
        /* ฟังก์ชันเชื่อมต่อกับ script.js โดยไม่แก้โค้ดข้างใน */
        function openOrderPopup() {
            document.getElementById("orderPopup").style.display = "flex";
            if(window.renderOrderCart) window.renderOrderCart(); 
        }
        function closeOrderPopup() { document.getElementById("orderPopup").style.display = "none"; }
        function openBillPopup() {
            document.getElementById("billPopup").style.display = "flex";
            if(window.loadBill) window.loadBill(); 
        }
        function closeBillPopup() { document.getElementById("billPopup").style.display = "none"; }
        function openTarot() { if(window.drawTarot) window.drawTarot(); }
        function closePopup() { document.getElementById("tarotPopup").style.display = "none"; }

        /* ระบบ Profile */
        function toggleUserMenu() {
            const menu = document.getElementById("userMenu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }
        function logout() { localStorage.clear(); window.location.reload(); }

        /* ฟังก์ชันเปิด Modal แก้โปรไฟล์ โดยให้ดึงรูปปัจจุบันจาก Topbar มาแสดงก่อน */
        function openEditProfile() {
            const user = localStorage.getItem("loginUser");
            document.getElementById("editUser").value = user;
            document.getElementById("displayUsername").value = user;
            document.getElementById("userMenu").style.display = "none";

            // ดึงรูปภาพปัจจุบันจากแถบ Topbar มาแสดงใน Modal Preview
            const currentImg = document.querySelector("#userIconContainer img");
            const preview = document.getElementById("avatarPreview");
            if (currentImg && currentImg.src) {
                preview.src = currentImg.src;
            } else {
                // ถ้ายังไม่มีรูปโปรไฟล์ ให้ใช้ไอคอนพื้นฐาน
                preview.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
            }

            new bootstrap.Modal(document.getElementById('editProfileModal')).show();
        }

        /* พรีวิวรูปเมื่อมีการเลือกไฟล์ใหม่ */
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('avatarPreview').src = reader.result;
            }
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        // ปิดเมนูเมื่อคลิกข้างนอก
        window.addEventListener("click", (e) => {
            if (!e.target.closest('#userProfile')) {
                const menu = document.getElementById("userMenu");
                if(menu) menu.style.display = "none";
            }
        });
    </script>
</body>
</html>
