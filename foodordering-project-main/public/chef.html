<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Cottage - ครัว</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="chef-page">

    <header class="chef-header" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;">
      <h1 class="chef-logo" style="margin: 0;">🍳 De Cottage - ครัว</h1>
      <div style="display: flex; gap: 15px; align-items: center;">
        <button onclick="chefLogout()" style="background: #dc2626; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: 500;">
          ออกจากระบบ
        </button>
      </div>
    </header>

  <main class="chef-main">
    <div id="chefOrderList" class="chef-order-list"></div>
    <div id="chefEmpty" class="chef-empty" style="display:none">
      <p>ไม่มีออเดอร์ในขณะนี้</p>
    </div>
  </main>

  <div id="alertPopup" class="popup-overlay" style="display: none;">
    <div class="popup-box">
      <h2>📣 แจ้งเตือน</h2>
      <p id="alertMessage"></p>
      <button id="closePopup">รับทราบ</button>
    </div>
  </div>
    <script>
      function chefLogout() {
        if(confirm("ยืนยันการออกจากระบบสำหรับเชฟ?")) {
          localStorage.clear(); // ล้างข้อมูล loginUser และ role
          window.location.href = "index.html"; // เด้งกลับไปหน้าแรก
        }
      }
    </script>

  <script src="chef.js"></script>
</body>

</html>
